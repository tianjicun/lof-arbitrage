name: Sync Daily Job

on:
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 1️⃣ 同步 LOF 数据
      - name: Run sync_daily.py
        run: |
          python scripts/sync_daily.py

      # 2️⃣ 获取基金申购数据
      - name: Run fetch_fund_purchase.py
        run: |
          python scripts/fetch_fund_purchase.py

      # 3️⃣ bump APP_VERSION（触发 Streamlit reload）
      - name: Bump APP_VERSION
        run: |
          VERSION=$(date -u +"%Y-%m-%d %H:%M UTC")
          sed -i "s/^APP_VERSION = .*/APP_VERSION = \"$VERSION\"/" scripts/LOF_dashboard.py
          echo "APP_VERSION bumped to $VERSION"

      # 4️⃣ 提交本地变更
      - name: Commit local changes
        env:
          MY_TOKEN: ${{ secrets.LOF_PUSH_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git remote set-url origin "https://x-access-token:${MY_TOKEN}@github.com/${{github.actor}}/lof-arbitrage.git"

          git add data/ last_sync_time.txt fund_purchase_em_*.csv scripts/LOF_dashboard.py

          if git diff --staged --quiet; then
            echo "🟡 No changes to commit"
          else
            git commit -m "🤖 Auto sync: daily data & fund purchase update"
          fi

      # 5️⃣ rebase + push
      - name: Pull & Push
        env:
          MY_TOKEN: ${{ secrets.LOF_PUSH_TOKEN }}
        run: |
          git pull origin main --rebase --autostash
          git push origin main
